---
layout: default
---
<h1>{{ page.title }}</h1>
<p><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time></p>
{% if page.tags.size > 0 %}
<p>Tags: {% for tag in page.tags %}{{ tag }}{% unless forloop.last %}, {% endunless %}{% endfor %}</p>
{% endif %}

{{ content }}

<p><a href="{{ '/blog/' | relative_url }}">&larr; Back to blog</a></p>
